shell=fish
font=JetBrains Mono Nerd Font:size=12

[scrollback]
lines=10000

[cursor]
style=beam
beam-thickness=1.5

[colors-dark]
alpha=0.78

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
search-start=Control+Shift+f

[search-bindings]
cancel=Escape
find-prev=Shift+F3
find-next=F3 Control+G
